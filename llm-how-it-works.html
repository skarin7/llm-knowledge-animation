// animations.jsx
// Reusable animation starter: Stage, Timeline, Sprite, easing helpers.
// Exports (to window): Stage, Sprite, PlaybackBar, TextSprite, ImageSprite, RectSprite,
//   useTime, useTimeline, useSprite, Easing, interpolate, animate, clamp.
//
// Usage (in an HTML file that loads React + Babel):
//
//   <Stage width={1280} height={720} duration={10} background="#f6f4ef">
//     <MyScene />
//   </Stage>
//
// <Stage> auto-scales to the viewport and provides the scrubber, play/pause,
// ←/→ seek, space, and 0-to-reset controls, and persists the playhead.
// Inside <Stage>, any child can call useTime() to read the current
// playhead (seconds). Or wrap content in <Sprite start={1} end={4}>...</Sprite>
// to only render during that window -- children receive a `localTime` and
// `progress` via the useSprite() hook. Use Easing + interpolate()/animate()
// for tweens; TextSprite / ImageSprite / RectSprite have built-in entry/exit.
// Build YOUR scenes by composing Sprites inside a Stage.
/* END USAGE */
// ─────────────────────────────────────────────────────────────────────────────

// ── Easing functions (hand-rolled, Popmotion-style) ─────────────────────────
// All easings take t ∈ [0,1] and return eased t ∈ [0,1] (may overshoot for back/elastic).
const Easing = {
  linear: (t) => t,

  // Quad
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),

  // Cubic
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),

  // Quart
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),

  // Expo
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutExpo: (t) => {
    if (t === 0) return 0;
    if (t === 1) return 1;
    if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10);
    return 1 - 0.5 * Math.pow(2, -20 * t + 10);
  },

  // Sine
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,

  // Back (overshoot)
  easeOutBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  easeInBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return c3 * t * t * t - c1 * t * t;
  },
  easeInOutBack: (t) => {
    const c1 = 1.70158, c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2
      : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;

  // Elastic
  easeOutElastic: (t) => {
    const c4 = (2 * Math.PI) / 3;
    if (t === 0) return 0;
    if (t === 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  },

// ── Core interpolation helpers ──────────────────────────────────────────────

// Clamp a value to [min, max]
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

// interpolate([0, 0.5, 1], [0, 100, 50], ease?) -> fn(t)
// Popmotion-style: linearly maps t across input keyframes to output values,
// with optional easing per segment (single fn or array of fns).
function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        const eased = easeFn(local);
        return output[i] + (output[i + 1] - output[i]) * eased;
      }
    }
    return output[output.length - 1];
  };
}

// animate({from, to, start, end, ease})(t) — simpler single-segment tween.
// Returns `from` before `start`, `to` after `end`.
function animate({ from = 0, to = 1, start = 0, end = 1, ease = Easing.easeInOutCubic }) {
  return (t) => {
    if (t <= start) return from;
    if (t >= end) return to;
    const local = (t - start) / (end - start);
    return from + (to - from) * ease(local);
  };
}

// ── Timeline context ────────────────────────────────────────────────────────

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });

const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

// ── Sprite ──────────────────────────────────────────────────────────────────
// Renders children only when the playhead is inside [start, end]. Provides
// a sub-context with `localTime` (seconds since start) and `progress` (0..1).
//
//   <Sprite start={2} end={5}>
//     {({ localTime, progress }) => <Thing x={progress * 100} />}
//   </Sprite>
//
// Or as a plain wrapper — children can call useSprite() themselves.

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;

  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration)
    ? clamp(localTime / duration, 0, 1)
    : 0;

  const value = { localTime, progress, duration, visible };

  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

// ── Sample sprite components ────────────────────────────────────────────────

// TextSprite: fades/slides text in on entry, holds, then fades out on exit.
// Props: text, x, y, size, color, font, entryDur, exitDur, align
function TextSprite({
  text,
  x = 0, y = 0,
  size = 48,
  color = '#111',
  font = 'Inter, system-ui, sans-serif',
  weight = 600,
  entryDur = 0.45,
  exitDur = 0.35,
  entryEase = Easing.easeOutBack,
  exitEase = Easing.easeInCubic,
  align = 'left',
  letterSpacing = '-0.01em',
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let ty = 0;

  if (localTime < entryDur) {
    const t = entryEase(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    ty = (1 - t) * 16;
  } else if (localTime > exitStart) {
    const t = exitEase(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    ty = -t * 8;
  }

  const translateX = align === 'center' ? '-50%' : align === 'right' ? '-100%' : '0';

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      transform: `translate(${translateX}, ${ty}px)`,
      opacity,
      fontFamily: font,
      fontSize: size,
      fontWeight: weight,
      color,
      letterSpacing,
      whiteSpace: 'pre',
      lineHeight: 1.1,
      willChange: 'transform, opacity',
    }}>
      {text}
    </div>
  );
}

// ImageSprite: scales + fades in; optional Ken Burns drift during hold.
function ImageSprite({
  src,
  x = 0, y = 0,
  width = 400, height = 300,
  entryDur = 0.6,
  exitDur = 0.4,
  kenBurns = false,
  kenBurnsScale = 1.08,
  radius = 12,
  fit = 'cover',
  placeholder = null, // {label: string} for striped placeholder
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutCubic(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    scale = 0.96 + 0.04 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInCubic(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = (kenBurns ? kenBurnsScale : 1) + 0.02 * t;
  } else if (kenBurns) {
    const holdSpan = exitStart - entryDur;
    const holdT = holdSpan > 0 ? (localTime - entryDur) / holdSpan : 0;
    scale = 1 + (kenBurnsScale - 1) * holdT;
  }

  const content = placeholder ? (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'repeating-linear-gradient(135deg, #e9e6df 0 10px, #dcd8cf 10px 20px)',
      color: '#6b6458',
      fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      fontSize: 13,
      letterSpacing: '0.04em',
      textTransform: 'uppercase',
    }}>
      {placeholder.label || 'image'}
    </div>
  ) : (
    <img src={src} alt="" style={{ width: '100%', height: '100%', objectFit: fit, display: 'block' }} />
  );

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      borderRadius: radius,
      overflow: 'hidden',
      willChange: 'transform, opacity',
    }}>
      {content}
    </div>
  );
}

// RectSprite: simple rectangle that animates position/size/color via props.
// Useful demo primitive — takes a `render` fn for per-frame customization.
function RectSprite({
  x = 0, y = 0,
  width = 100, height = 100,
  color = '#111',
  radius = 8,
  entryDur = 0.4,
  exitDur = 0.3,
  render, // optional: (ctx) => style overrides
}) {
  const spriteCtx = useSprite();
  const { localTime, duration } = spriteCtx;
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutBack(clamp(localTime / entryDur, 0, 1));
    opacity = clamp(localTime / entryDur, 0, 1);
    scale = 0.4 + 0.6 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInQuad(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = 1 - 0.15 * t;
  }

  const overrides = render ? render(spriteCtx) : {};

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      background: color,
      borderRadius: radius,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      willChange: 'transform, opacity',
      ...overrides,
    }} />
  );
}


function Stage({

  height = 720,
  duration = 20,
  background = '#f6f4ef',
  fps = 60,
  loop = true,
  autoplay = true,
  persistKey = 'animstage',
  children,

  const [scale, setScale] = React.useState(1);

  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);

        (el.clientHeight - barH) / height

      window.removeEventListener('resize', measure);
    };

      lastTsRef.current = null;
      return;

      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }

    };

    return () => {

      lastTsRef.current = null;
    };

        } else { setPlaying(p => !p); }
      } else if (e.code === 'ArrowLeft') {

      } else if (e.code === 'ArrowRight') {
        setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.key === '0' || e.code === 'Home') {
        setTime(0);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration]);

  const displayTime = hoverTime != null ? hoverTime : time;

  const ctxValue = React.useMemo(
    () => ({ time: displayTime, duration, playing, setTime, setPlaying }),
    [displayTime, duration, playing]
  );

  return (
    <div
      ref={stageRef}
      style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center',
        background: '#0a0a0a',
        fontFamily: 'Inter, system-ui, sans-serif',
      }}
    >
      {/* Canvas area — vertically centered in remaining space */}
      <div style={{
        flex: 1,
        width: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden',
        minHeight: 0,
      }}>
        <div
          ref={canvasRef}
          style={{
            width, height,
            background,
            position: 'relative',
            transform: `scale(${scale})`,
            transformOrigin: 'center',
            flexShrink: 0,
            boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
            overflow: 'hidden',
          }}
        >
          <TimelineContext.Provider value={ctxValue}>
            {children}
          </TimelineContext.Provider>
        </div>
      </div>

      {/* Playback bar — stacked below canvas, never overlapping */}
      <PlaybackBar
        time={displayTime}
        actualTime={time}
        duration={duration}
        playing={playing}
        onPlayPause={() => {
          if (!playing && timeRef.current >= duration - 0.5) {
            setTime(0); setPlaying(true);
          } else { setPlaying(p => !p); }
        }}
        onReset={() => { setTime(0); }}
        onSeek={(t) => setTime(t)}
        onHover={(t) => setHoverTime(t)}
      />
    </div>
  );
}

// ── Playback bar ────────────────────────────────────────────────────────────
// Play/pause, return-to-begin, scrub track, time display.
// Uses fixed-width time fields so layout doesn't thrash.

function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    const x = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    return x * duration;
  }, [duration]);

  const onTrackMove = (e) => {
    if (!trackRef.current) return;
    const t = timeFromEvent(e);
    if (dragging) {
      onSeek(t);
    } else {
      onHover(t);
    }
  };

  const onTrackLeave = () => {
    if (!dragging) onHover(null);
  };

  const onTrackDown = (e) => {
    setDragging(true);
    const t = timeFromEvent(e);
    onSeek(t);
    onHover(null);
  };

    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => {
      if (!trackRef.current) return;
      const t = timeFromEvent(e);
      onSeek(t);
    };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    return () => {
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('mousemove', onMove);
    };
  }, [dragging, timeFromEvent, onSeek]);

  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = (t) => {
    const total = Math.max(0, t);
    const m = Math.floor(total / 60);
    const s = Math.floor(total % 60);
    const cs = Math.floor((total * 100) % 100);
    return `${String(m).padStart(1, '0')}:${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
  };

  const mono = 'JetBrains Mono, ui-monospace, SFMono-Regular, monospace';

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '8px 16px',
      background: 'rgba(20,20,20,0.92)',
      borderTop: '1px solid rgba(255,255,255,0.08)',
      width: '100%',
      maxWidth: 680,
      alignSelf: 'center',

      borderRadius: 8,
      color: '#f6f4ef',
      fontFamily: 'Inter, system-ui, sans-serif',
      userSelect: 'none',
      flexShrink: 0,
    }}>
      <IconButton onClick={onReset} title="Return to start (0)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      </IconButton>
      <IconButton onClick={onPlayPause} title="Play/pause (space)">
        {playing ? (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="3" y="2" width="3" height="10" fill="currentColor"/>
            <rect x="8" y="2" width="3" height="10" fill="currentColor"/>

const INK='#2a2f2b',GREEN='#1f8a5b',LGREEN='rgba(31,138,91,0.11)',AMBER='#b07d18',LAMBER='rgba(176,125,24,0.10)',FADE='rgba(42,47,43,0.42)';
const VW=1280,VH=720;
const HAND="'Patrick Hand', cursive",HTITLE="'Caveat', cursive",MONO="'JetBrains Mono', ui-monospace, monospace";

function SketchDefs(){return(<svg width="0" height="0" style={{position:'absolute',overflow:'hidden',pointerEvents:'none'}}><defs><filter id="rough" x="-10%" y="-10%" width="120%" height="120%"><feTurbulence type="fractalNoise" baseFrequency="0.017" numOctaves="2" seed="7" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="2.8" xChannelSelector="R" yChannelSelector="G"/></filter></defs></svg>);}
function Paper(){return <div style={{position:'absolute',inset:0,pointerEvents:'none',backgroundImage:'radial-gradient(circle, rgba(42,47,43,0.11) 1.2px, transparent 1.2px)',backgroundSize:'34px 34px'}}/>;}
function Draw({start,end,dur=0.55,children}){return(<Sprite start={start} end={end}>{({localTime})=>children(clamp(localTime/dur,0,1),localTime)}</Sprite>);}
function Scene({start,end,fade=0.5,children}){const t=useTime();if(t<start-0.05||t>end+0.05)return null;const op=Math.min(Easing.easeOutCubic(clamp((t-start)/fade,0,1)),Easing.easeOutCubic(clamp((end-t)/fade,0,1)));return <div style={{position:'absolute',inset:0,opacity:op}}>{children}</div>;}
function Label({start,end,x=0,y=0,size=24,color=INK,font=HAND,weight=400,align='left',width:lw='auto',style,children}){return(<Sprite start={start} end={end}>{({localTime,duration})=>{const fin=isFinite(duration)?duration:9999;const inP=Easing.easeOutCubic(clamp(localTime/0.36,0,1));const outP=Easing.easeInCubic(clamp((localTime-(fin-0.36))/0.36,0,1));const op=Math.min(inP,1-outP);const ty=(1-inP)*11;return <div style={{position:'absolute',left:x,top:y,width:lw,opacity:op,transform:`translateY(${ty}px)`,fontFamily:font,fontSize:size,color,fontWeight:weight,textAlign:align,lineHeight:1.35,whiteSpace:'pre-line',pointerEvents:'none',...style}}>{children}</div>;}}</Sprite>);}
function Box({x,y,w,h,draw=1,fill='none',stroke=INK,sw=2.6,r=13,children,childStyle,labelSize=21}){const perim=2*(w+h);const offset=perim*(1-clamp(draw,0,1));return(<div style={{position:'absolute',left:x,top:y,width:w,height:h}}><svg width={w} height={h} style={{position:'absolute',inset:0,overflow:'visible'}}><rect x={sw+1} y={sw+1} width={w-2*(sw+1)} height={h-2*(sw+1)} rx={r} ry={r} fill={fill} stroke={stroke} strokeWidth={sw} strokeDasharray={perim} strokeDashoffset={offset} strokeLinecap="round" filter="url(#rough)"/></svg><div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',padding:'8px 14px',textAlign:'center',fontFamily:HAND,fontSize:labelSize,color:INK,lineHeight:1.35,whiteSpace:'pre-line',...childStyle}}>{children}</div></div>);}
function Arrow({x1,y1,x2,y2,cx,cy,draw=1,color=INK,sw=2.5}){const mx=cx!==undefined?cx:(x1+x2)/2;const my=cy!==undefined?cy:(y1+y2)/2;const path=`M ${x1} ${y1} Q ${mx} ${my} ${x2} ${y2}`;const ang=Math.atan2(y2-my,x2-mx);const hl=13,ha=0.42;const h1=`M ${x2} ${y2} L ${x2-hl*Math.cos(ang-ha)} ${y2-hl*Math.sin(ang-ha)}`;const h2=`M ${x2} ${y2} L ${x2-hl*Math.cos(ang+ha)} ${y2-hl*Math.sin(ang+ha)}`;const hOp=clamp((draw-0.80)/0.20,0,1);return(<svg style={{position:'absolute',left:0,top:0,width:VW,height:VH,overflow:'visible',pointerEvents:'none'}}><path d={path} fill="none" stroke={color} strokeWidth={sw} pathLength="1" strokeDasharray="1" strokeDashoffset={1-clamp(draw,0,1)} strokeLinecap="round" filter="url(#rough)"/><g opacity={hOp}><path d={h1} fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" filter="url(#rough)"/><path d={h2} fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" filter="url(#rough)"/></g></svg>);}
function Squiggle({x,y,len,draw=1,color=GREEN,sw=4}){const d=`M ${x} ${y} Q ${x+len*0.25} ${y+7} ${x+len*0.5} ${y} Q ${x+len*0.75} ${y-7} ${x+len} ${y}`;return(<svg style={{position:'absolute',left:0,top:0,width:VW,height:VH,overflow:'visible',pointerEvents:'none'}}><path d={d} fill="none" stroke={color} strokeWidth={sw} pathLength="1" strokeDasharray="1" strokeDashoffset={1-clamp(draw,0,1)} strokeLinecap="round" filter="url(#rough)"/></svg>);}

function LogitBar({x,y,label,barMaxW=196,score,prob,color=GREEN,draw=1}){

function TopBar({start,end}){
  const t=useTime();
  if(t<start||t>end)return null;
  const op=Math.min(Easing.easeOutCubic(clamp((t-start)/0.5,0,1)),Easing.easeOutCubic(clamp((end-t)/0.5,0,1)));

    </div>
  </div>);
}

// ══ KV CACHE SCENE (140–162) ════════════════════════════════════════════════
function KVCacheScene(){
  const SS=140,SE=162;
  const toks1=['What',' is',' the',' capital',' of',' France','?'];

    <Label start={SS+0.5} end={SE} x={0} y={96} size={18} font={HAND} align="center" width={VW} color={FADE}>Why the model doesn't redo all the work after each new token</Label>

    <Label start={SS+1.5} end={SE} x={35} y={132} size={18} font={HAND} weight={600} color={INK}>Input before prediction — 7 tokens:</Label>
    {toks1.map((tok,i)=>(

        <Box x={35+i*84} y={154} w={80} h={44} draw={d} stroke={AMBER} fill={LAMBER} sw={1.8} r={8} labelSize={13}>{tok}</Box>}
      </Draw>
    ))}

    <Draw start={SS+3.8} end={SE} dur={0.3}>{(d)=><Arrow x1={200} y1={198} x2={200} y2={222} draw={d} color={GREEN} sw={2}/>}</Draw>
    <Label start={SS+4.0} end={SE} x={35} y={224} size={16} font={HAND} color={GREEN}>model predicts "Paris" → appended to input (8 tokens now):</Label>

    {toks2.map((tok,i)=>(
      <Draw key={i} start={SS+4.5+i*0.15} end={SE} dur={0.35}>{(d)=>
        <Box x={35+i*72} y={248} w={68} h={44} draw={d}
          stroke={i===7?GREEN:AMBER}
          fill={i===7?LGREEN:LAMBER}

    <Label start={SS+6.5} end={SE} x={35} y={308} size={18} font={HAND} weight={600} color={'#c0392b'}>Naïve: recalculate attention for ALL 8 tokens from scratch</Label>
    <Label start={SS+7.0} end={SE} x={35} y={332} size={15} font={HAND} color={FADE}>8 tokens → 64 attention pairs. 100 tokens → 10,000 pairs. 1000 tokens → 1M pairs. O(n²) growth.</Label>

    <Draw start={SS+8.0} end={SE} dur={0.3}>{(d)=><Arrow x1={200} y1={356} x2={200} y2={380} draw={d} color={GREEN} sw={2.5}/>}</Draw>
    <Label start={SS+8.3} end={SE} x={35} y={382} size={18} font={HAND} weight={600} color={GREEN}>KV Cache: save Key &amp; Value matrices from previous steps</Label>

    <Draw start={SS+9.0} end={SE} dur={0.55}>{(d)=>
      <Box x={35} y={408} w={375} h={64} draw={d} stroke={GREEN} fill={LGREEN} sw={2} r={10} childStyle={{alignItems:'flex-start',padding:'8px 14px'}}>
        <div><div style={{fontSize:16,fontWeight:600,color:GREEN}}>Cached K, V for tokens 1–7 ✓</div><div style={{fontSize:13,color:FADE}}>Computed once, reused every future step</div></div>
      </Box>}
    </Draw>

    <Draw start={SS+10.0} end={SE} dur={0.55}>{(d)=>
      <Box x={425} y={408} w={185} h={64} draw={d} stroke={AMBER} fill={LAMBER} sw={2} r={10} childStyle={{padding:'8px 10px'}}>
        <div><div style={{fontSize:15,fontWeight:600,color:AMBER}}>New: "Paris"</div><div style={{fontSize:12,color:FADE}}>Compute K, V once</div></div>
      </Box>}
    </Draw>

    <Label start={SS+11.0} end={SE} x={35} y={484} size={17} font={HAND} weight={600} color={GREEN}>→ New token attends against cached K,V. Only 1 new row computed.</Label>
    <Label start={SS+12.0} end={SE} x={35} y={510} size={15} font={HAND} color={FADE}>Each generation step: O(n) work, not O(n²). Crucial for fast long-context inference.</Label>

    <Draw start={SS+7.5} end={SE} dur={0.55}>{(d)=>
      <Box x={645} y={108} w={590} h={295} draw={d} stroke={AMBER} fill={LAMBER} sw={2.3} r={14} childStyle={{alignItems:'flex-start',justifyContent:'flex-start',padding:'14px 18px'}}>

          <div style={{fontSize:19,fontWeight:600,color:AMBER,marginBottom:8}}>What are Keys and Values?</div>
          <div style={{fontSize:14,marginBottom:6}}>In each attention layer, every token produces 3 vectors:</div>
          <div style={{fontFamily:MONO,fontSize:13,marginBottom:4,color:GREEN}}>Q (Query)  — "what am I looking for?"</div>
          <div style={{fontFamily:MONO,fontSize:13,marginBottom:4,color:AMBER}}>K (Key)    — "what do I contain?"</div>
          <div style={{fontFamily:MONO,fontSize:13,marginBottom:8,color:INK}}>V (Value)  — "what info do I pass on?"</div>
          <div style={{fontSize:13,marginBottom:5}}>Attention = softmax(Q × Kᵀ / √d) × V</div>
          <div style={{fontSize:13,marginBottom:5,color:FADE}}>K and V depend only on each token's content &amp; position — fixed after first computation. Only Q changes each step (new token asks a new question).</div>
          <div style={{fontSize:13,color:FADE}}>Cache K,V for all previous tokens. New token just adds 1 new row to attend against.</div>
        </div>
      </Box>}
    </Draw>

    <Draw start={SS+14.0} end={SE} dur={0.55}>{(d)=>
      <Box x={645} y={423} w={590} h={220} draw={d} stroke={GREEN} fill={LGREEN} sw={2.3} r={14} childStyle={{alignItems:'flex-start',justifyContent:'flex-start',padding:'14px 18px'}}>
        <div style={{textAlign:'left',width:'100%'}}>
          <div style={{fontSize:18,fontWeight:600,color:GREEN,marginBottom:8}}>Real-world impact</div>
          <div style={{fontSize:14,marginBottom:5}}>• Without cache: 1000-token output ≈ 500M attention computations</div>
          <div style={{fontSize:14,marginBottom:5}}>• With KV cache: ~500K — <b>1000× fewer calculations</b></div>
          <div style={{fontSize:14,marginBottom:5}}>• Tradeoff: GPU memory grows with context (n × layers × dim)</div>
          <div style={{fontSize:13,color:FADE,marginTop:6}}>Why longer contexts cost more — not just more tokens to process, but larger KV cache held in GPU RAM throughout generation.</div>
        </div>
      </Box>}
    </Draw>

    <Label start={SS+18.0} end={SE} x={0} y={628} size={19} font={HAND} align="center" width={VW} color={FADE}>KV cache: trade GPU memory for speed — the trick that makes real-time LLM inference possible</Label>
  </Scene>);
}
